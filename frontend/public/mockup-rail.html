<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where you are — Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #161921; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .rail-card {
    min-width: 220px;
    padding: 20px 24px 18px;
    border-left: 1px solid rgba(255,255,255,0.06);
  }
  .rail-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.30);
    margin-bottom: 20px;
  }
  .step { display: flex; align-items: flex-start; gap: 14px; position: relative; }
  .step-track { display: flex; flex-direction: column; align-items: center; width: 28px; flex-shrink: 0; }
  .step-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .step-line { width: 2px; height: 32px; flex-shrink: 0; }

  /* Completed */
  .step.completed .step-icon { background: rgba(46,196,182,0.12); border: 1.5px solid rgba(46,196,182,0.35); }
  .step.completed .step-icon svg { color: #2ec4b6; }
  .step.completed .step-line { background: rgba(46,196,182,0.20); }
  .step.completed .step-status { color: #2ec4b6; }
  .step.completed .step-label { color: rgba(255,255,255,0.85); }

  /* Active */
  .step.active .step-icon { background: rgba(249,115,22,0.15); border: 1.5px solid rgba(249,115,22,0.5); box-shadow: 0 0 12px rgba(249,115,22,0.2); }
  .step.active .step-icon svg { color: #f97316; }
  .step.active .step-line { background: rgba(255,255,255,0.06); }
  .step.active .step-status { color: #f97316; }
  .step.active .step-label { color: rgba(255,255,255,0.95); font-weight: 700; }
  .step.active .step-desc { color: rgba(255,255,255,0.35); }

  /* Future */
  .step.future .step-icon { background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.08); }
  .step.future .step-icon svg { color: rgba(255,255,255,0.18); }
  .step.future .step-status { color: rgba(255,255,255,0.22); }
  .step.future .step-label { color: rgba(255,255,255,0.30); }

  .step-content { padding-top: 2px; padding-bottom: 24px; }
  .step:last-child .step-content { padding-bottom: 0; }
  .step-status { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .step-label { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .step-desc { font-size: 11px; margin-top: 2px; line-height: 1.4; }

  .trajectory {
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.40);
  }
  .trajectory svg { color: #2ec4b6; }
  .trajectory strong { color: #2ec4b6; font-weight: 700; }
</style>
</head>
<body>

<div class="rail-card">
  <div class="rail-title">Where you are</div>

  <!-- Step 1: Completed -->
  <div class="step completed">
    <div class="step-track">
      <div class="step-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="step-line"></div>
    </div>
    <div class="step-content">
      <div class="step-status">Completed</div>
      <div class="step-label">Outreach & Initial Film</div>
    </div>
  </div>

  <!-- Step 2: Completed -->
  <div class="step completed">
    <div class="step-track">
      <div class="step-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="step-line"></div>
    </div>
    <div class="step-content">
      <div class="step-status">Completed</div>
      <div class="step-label">Direct Communication</div>
    </div>
  </div>

  <!-- Step 3: Active / Current Focus -->
  <div class="step active">
    <div class="step-track">
      <div class="step-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="step-line"></div>
    </div>
    <div class="step-content">
      <div class="step-status">Current Focus</div>
      <div class="step-label">Official Offer Phase</div>
      <div class="step-desc">Negotiating terms & scholarship</div>
    </div>
  </div>

  <!-- Step 4: Future / Next Up -->
  <div class="step future">
    <div class="step-track">
      <div class="step-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
    </div>
    <div class="step-content">
      <div class="step-status">Next Up</div>
      <div class="step-label">Commitment & Signing</div>
    </div>
  </div>

  <!-- Trajectory -->
  <div class="trajectory">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    Trajectory: <strong>Rising</strong>
  </div>
</div>

</body>
</html>
